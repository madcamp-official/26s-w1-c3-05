services:
  postgres:
    image: postgres:16
    container_name: myocatmongo-postgres
    environment:
      POSTGRES_USER: myocatmongo
      POSTGRES_PASSWORD: myocatmongo
      POSTGRES_DB: myocatmongo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  vision:
    build:
      context: ../vision-service
    container_name: myocatmongo-vision
    environment:
      VISION_MODEL: yolo11n.pt
      CAT_CONFIDENCE_THRESHOLD: "0.25"
    ports:
      - "8001:8001"

volumes:
  postgres-data:
