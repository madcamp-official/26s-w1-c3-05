services:
  postgres:
    image: postgres:16
    container_name: myocatmongo-postgres
    environment:
      POSTGRES_USER: myocatmongo
      POSTGRES_PASSWORD: myocatmongo
      POSTGRES_DB: myocatmongo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
